  <link rel="preconnect" href="https://fonts.googleapis.com">

  <main class="page" aria-label="CAKE.SQUARED links">
    <section class="hero-card">
      <div class="brand-orb" aria-hidden="true">
        <img
          src="assets/cake-logo.png"
          alt=""
          class="orb-image cake-logo"
          loading="lazy"
          decoding="async"
        >

      <h1>CAKE.SQUARED</h1>

    <section class="links" aria-label="Projects">

            alt=""

            loading="lazy"
            decoding="async"

        </div>

          <h2>Wage Watcher</h2>

            class="orb-image brain-icon"
            loading="lazy"
            decoding="async"

        <div class="app-card" aria-hidden="true">

          <p>Capture ideas instantly and organize them later so nothing important slips away.</p>
